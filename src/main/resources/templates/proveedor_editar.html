<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Proveedor - Asistencia El Salvador</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/empresa.css}">
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Editar Proveedor de Servicios</h1>
        <span class="subtitle">Modifica la información del proveedor</span>
    </div>

    <!-- Mensaje de error -->
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Datos del proveedor</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/proveedores/actualizar}" th:object="${proveedor}" method="post" enctype="multipart/form-data" id="proveedorForm">

                <!-- ID oculto -->
                <input type="hidden" th:field="*{idProveedor}">

                <!-- Mostrar logo actual si existe -->
                <div th:if="${proveedor.imagenURL}" class="current-logo">
                    <label>Logo Actual:</label>
                    <img th:src="@{${proveedor.imagenURL}}" alt="Logo actual" class="logo-preview">
                    <input type="hidden" th:field="*{imagenURL}">
                </div>

                <div class="form-grid">
                    <!-- NIT -->
                    <div class="form-group">
                        <label for="nit">NIT</label>
                        <input type="text" th:field="*{NIT}" id="nit" class="input" placeholder="0000-000000-000-0" pattern="[0-9]{4}-[0-9]{6}-[0-9]{3}-[0-9]" required>
                        <small class="form-text">El NIT debe ser único</small>
                    </div>

                    <!-- Nombre Proveedor -->
                    <div class="form-group">
                        <label for="nombreProveedor">Nombre del proveedor</label>
                        <input type="text" th:field="*{nombreProveedor}" id="nombreProveedor" class="input" placeholder="Ingrese el nombre del proveedor" required>
                    </div>

                    <!-- Dirección -->
                    <div class="form-group full-width">
                        <label for="direccion">Dirección</label>
                        <input type="text" th:field="*{direccion}" id="direccion" class="input" placeholder="Ingrese la dirección completa del proveedor" required>
                    </div>

                    <!-- País -->
                    <div class="form-group">
                        <label for="pais">País</label>
                        <select id="pais" th:field="*{idPais}" class="input" required>
                            <option value="">Seleccione un país</option>
                            <option th:each="p : ${paises}" th:value="${p.idPais}" th:text="${p.nombrePais}"></option>
                        </select>
                    </div>

                    <!-- Teléfono -->
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" th:field="*{telefono}" id="telefono" class="input" placeholder="0000-0000" pattern="[0-9]{4}-[0-9]{4}" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" th:field="*{email}" id="email" class="input" placeholder="correo@proveedor.com" required>
                    </div>

                    <!-- Representante Legal -->
                    <div class="form-group">
                        <label for="repreLegalNombre">Representante Legal</label>
                        <input type="text" th:field="*{repreLegalNombre}" id="repreLegalNombre" class="input" placeholder="Nombre del representante legal" required>
                    </div>

                    <!-- Categoría Empresa -->
                    <div class="form-group">
                        <label for="categoriaEmpresa">Categoría de Empresa</label>
                        <select id="categoriaEmpresa" th:field="*{idCategoriaEmpresa}" class="input" required>
                            <option value="">Seleccione una categoría</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}" th:text="${cat.catNombre}"></option>
                        </select>
                    </div>

                    <!-- Estado -->
                    <div class="form-group">
                        <label><i class="fas fa-toggle-on"></i> Estado</label>
                        <select th:field="*{estado}" class="input" required>
                            <option value="">Seleccione el estado</option>
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>

                    <!-- Logo/Imagen del Proveedor -->
                    <div class="form-group full-width">
                        <label><i class="fas fa-image"></i> Cambiar Logo del Proveedor</label>
                        <div class="file-input-wrapper">
                            <input type="file" name="imagenFile" accept="image/*" id="imagenProveedor"
                                   onchange="updateFileLabel('imagenProveedor', 'imagenLabel')">
                            <label for="imagenProveedor" class="file-input-label" id="imagenLabel">
                                <i class="fas fa-cloud-upload-alt"></i>
                                Subir nueva imagen (opcional)
                            </label>
                        </div>
                        <small class="form-text">Si no selecciona una imagen, se mantendrá la actual</small>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i> Actualizar
                    </button>
                    <a th:href="@{/proveedores/}" class="btn secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function updateFileLabel(inputId, labelId) {
        const input = document.getElementById(inputId);
        const label = document.getElementById(labelId);

        if (input.files && input.files.length > 0) {
            const fileName = input.files[0].name;
            label.innerHTML = '<i class="fas fa-check"></i> ' + fileName;
            label.classList.add('file-selected');
        } else {
            label.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Subir nueva imagen (opcional)';
            label.classList.remove('file-selected');
        }
    }

    // Validación del formulario antes de enviar
    document.getElementById('proveedorForm').addEventListener('submit', function(e) {
        const imagenInput = document.getElementById('imagenProveedor');

        // Verificar tamaño de archivo (max 5MB)
        const maxSize = 5 * 1024 * 1024; // 5MB

        if (imagenInput.files && imagenInput.files.length > 0) {
            if (imagenInput.files[0].size > maxSize) {
                alert('La imagen es demasiado grande. Máximo 5MB.');
                e.preventDefault();
                return false;
            }
        }

        return true;
    });

    document.addEventListener('DOMContentLoaded', function() {
        // Validación automática del NIT
        const nitInput = document.getElementById('nit');
        if (nitInput) {
            nitInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 0) {
                    let formatted = '';
                    if (value.length >= 4) {
                        formatted = value.substring(0, 4) + '-';
                        if (value.length >= 10) {
                            formatted += value.substring(4, 10) + '-';
                            if (value.length >= 13) {
                                formatted += value.substring(10, 13) + '-';
                                formatted += value.substring(13, 14);
                            } else {
                                formatted += value.substring(10);
                            }
                        } else {
                            formatted += value.substring(4);
                        }
                    } else {
                        formatted = value;
                    }
                    e.target.value = formatted;
                }
            });
        }

        // Validación automática del teléfono
        const telInput = document.getElementById('telefono');
        if (telInput) {
            telInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length >= 4) {
                    value = value.substring(0, 4) + '-' + value.substring(4, 8);
                }
                e.target.value = value;
            });
        }

        // Mejorar la experiencia del file input
        const fileInput = document.getElementById('imagenProveedor');
        if (fileInput) {
            fileInput.addEventListener('change', function(e) {
                const label = document.getElementById('imagenLabel');
                const fileName = e.target.files[0]?.name;

                if (fileName) {
                    label.innerHTML = `<i class="fas fa-check-circle"></i> ${fileName}`;
                    label.classList.add('file-selected');
                }
            });
        }

        // Auto-ocultar mensajes de alerta
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 5000);
        });
    });
</script>

<style>
    .current-logo {
        text-align: center;
        margin-bottom: 30px;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 8px;
    }

    .current-logo label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        color: #495057;
    }

    .logo-preview {
        max-width: 200px;
        max-height: 200px;
        object-fit: contain;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .form-text {
        display: block;
        margin-top: 5px;
        font-size: 0.85rem;
        color: #6c757d;
    }

    .alert {
        padding: 15px 20px;
        margin-bottom: 20px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: opacity 0.3s;
    }

    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
    }
</style>
</body>
</html>
