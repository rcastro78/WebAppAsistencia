<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${esEdicion ? 'Editar Beneficio' : 'Nuevo Beneficio'} + ' - Asistencia El Salvador'">Beneficio - Asistencia El Salvador</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/empresa.css}">
</head>
<body>
<div class="app">
    <div class="header">
        <h1 th:text="${esEdicion ? 'Editar Servicio' : 'Nuevo Servicio'}">Servicio</h1>
        <span class="subtitle" th:text="${esEdicion ? 'Modifica la información del servicio' : 'Completa la información para registrar un nuevo servicio'}"></span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Datos del servicio</h2>
        </div>
        <div class="card-body">
            <form th:action="${esEdicion ? '/empresa/beneficios/editar?nit=' + nit + '&id=' + servicioEmpresaAfiliada.idServicio : '/empresa/beneficios/guardar'}"
                  th:object="${servicioEmpresaAfiliada}"
                  method="post"
                  id="beneficioForm">

                <!-- Campo oculto para el NIT -->
                <input type="hidden" name="idEmpresa" th:value="${nit}">

                <!-- Campo oculto para el ID en modo edición -->
                <input type="hidden" th:if="${esEdicion}" th:field="*{idServicio}">

                <div class="form-grid">
                    <!-- NIT (solo lectura) -->
                    <div class="form-group">
                        <label for="nitDisplay"><i class="fas fa-id-card"></i> NIT Empresa</label>
                        <input type="text" id="nitDisplay" class="input" th:value="${nit}" readonly>
                    </div>

                    <!-- Nombre del Servicio/Beneficio -->
                    <div class="form-group">
                        <label for="nombreServicio"><i class="fas fa-gift"></i> Nombre del Beneficio</label>
                        <input type="text" th:field="*{nombreServicio}" id="nombreServicio" class="input" placeholder="Ingrese el nombre del beneficio" maxlength="200" required>
                    </div>

                    <!-- Plan -->
                    <div class="form-group">
                        <label for="plan"><i class="fas fa-clipboard-list"></i> Plan</label>
                        <select id="plan" th:field="*{idPlan}" class="input" required>
                            <option value="">Seleccione un plan</option>
                            <option th:each="p : ${planes}"
                                    th:value="${p.idPlan}"
                                    th:text="${p.nombrePlan}"
                                    th:selected="${esEdicion && p.idPlan == servicioEmpresaAfiliada.idPlan}"></option>
                        </select>
                    </div>

                    <!-- Estado -->
                    <div class="form-group">
                        <label><i class="fas fa-toggle-on"></i> Estado</label>
                        <select th:field="*{estado}" class="input" required>
                            <option value="">Seleccione el estado</option>
                            <option value="1" th:selected="${esEdicion && servicioEmpresaAfiliada.estado == 1}">Activo</option>
                            <option value="0" th:selected="${esEdicion && servicioEmpresaAfiliada.estado == 0}">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn">
                        <i th:class="${esEdicion ? 'fas fa-edit' : 'fas fa-save'}"></i>
                        <span th:text="${esEdicion ? 'Actualizar' : 'Guardar'}">Guardar</span>
                    </button>




                    <a  class="btn secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>




                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Validación del formulario
        const form = document.getElementById('beneficioForm');

        form.addEventListener('submit', function(e) {
            const nombreServicio = document.getElementById('nombreServicio').value.trim();
            const plan = document.getElementById('plan').value;
            const estado = document.querySelector('select[name="estado"]').value;

            if (!nombreServicio || !plan || !estado) {
                alert('Por favor complete todos los campos requeridos');
                e.preventDefault();
                return false;
            }

            if (nombreServicio.length > 200) {
                alert('El nombre del beneficio no puede exceder 200 caracteres');
                e.preventDefault();
                return false;
            }

            return true;
        });

        // Contador de caracteres para nombre del servicio
        const nombreServicioInput = document.getElementById('nombreServicio');
        if (nombreServicioInput) {
            const maxLength = 200;
            const counterDiv = document.createElement('small');
            counterDiv.className = 'form-text';
            counterDiv.style.color = '#6c757d';
            nombreServicioInput.parentNode.appendChild(counterDiv);

            function updateCounter() {
                const currentLength = nombreServicioInput.value.length;
                counterDiv.textContent = `${currentLength}/${maxLength} caracteres`;

                if (currentLength > maxLength * 0.9) {
                    counterDiv.style.color = '#dc3545';
                } else {
                    counterDiv.style.color = '#6c757d';
                }
            }

            nombreServicioInput.addEventListener('input', updateCounter);
            updateCounter();
        }

        // Estilo para campo readonly
        const nitDisplay = document.getElementById('nitDisplay');
        if (nitDisplay) {
            nitDisplay.style.backgroundColor = '#e9ecef';
            nitDisplay.style.cursor = 'not-allowed';
        }
    });
</script>

<style>
    .form-text {
        display: block;
        margin-top: 5px;
        font-size: 0.85rem;
        color: #6c757d;
        font-style: italic;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }

    .form-group label i {
        margin-right: 8px;
        color: #007bff;
    }

    .input {
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    .input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
    }

    .input[readonly] {
        background-color: #e9ecef;
        cursor: not-allowed;
        color: #495057;
    }

    .actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        padding-top: 20px;
        border-top: 1px solid #eee;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background-color: #007bff;
        color: white;
    }

    .btn:hover {
        background-color: #0056b3;
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .btn.secondary {
        background-color: #6c757d;
    }

    .btn.secondary:hover {
        background-color: #545b62;
    }
</style>
</body>
</html>
