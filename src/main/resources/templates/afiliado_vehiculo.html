<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Vehículo - Asistencia El Salvador' : 'Registrar Vehículo - Asistencia El Salvador'">Datos del Vehículo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .alert {
            background: #d1ecf1;
            border-left: 4px solid #0dcaf0;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #055160;
        }

        .alert i {
            font-size: 1.2rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #FF8C00, #FFA500);
        }

        .card-header {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            padding: 25px 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .card-header h2 {
            color: #333;
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-body {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label .required {
            color: #dc3545;
            font-size: 1.2rem;
        }

        .input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
            background: #fafafa;
            font-family: inherit;
        }

        .input:focus, select:focus {
            border-color: #FF8C00;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
            background: white;
        }

        .input::placeholder {
            color: #aaa;
            font-weight: 400;
        }

        /* Iconos para los labels */
        label[for="marca"]::before { content: '\f1b9'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="modelo"]::before { content: '\f1ba'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="anio"]::before { content: '\f133'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="placa"]::before { content: '\f02b'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            min-width: 120px;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:not(.secondary) {
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        .btn:not(.secondary):hover {
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
        }

        .btn.secondary {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: #555;
            padding: 10px 28px;
        }

        .btn.secondary:hover {
            background: #e9ecef;
            color: #333;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .message {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease-out;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .help-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .help-text::before {
            content: '\f05a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card-body {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1 th:text="${modoEdicion} ? 'Editar Vehículo - Asistencia Vehicular' : 'Datos del Vehículo - Asistencia Vehicular, paso 6'">Datos del Vehículo</h1>
        <span class="subtitle" th:text="${modoEdicion} ? 'Actualice la información de su vehículo' : 'Registre la información de su vehículo'">Registre la información</span>
    </div>

    <!-- Alert informativo -->
    <div class="alert" th:if="${!modoEdicion}">
        <i class="fas fa-info-circle"></i>
        <span><strong>Importante:</strong> Ingrese los datos exactos de su vehículo según aparecen en la tarjeta de circulación.</span>
    </div>

    <!-- Mensaje de éxito/error -->
    <div th:if="${mensaje}" class="message success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${error}" class="message error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="${modoEdicion} ? @{/afiliado/vehiculo/actualizar} : @{/afiliado/vehiculo/guardar}"
          th:object="${afiliadoVehiculo}"
          method="post">

        <!-- Campo oculto para el ID (solo en modo edición) -->
        <input type="hidden" th:if="${modoEdicion}" th:field="*{idAfiliadoVehiculo}" />

        <!-- Campos ocultos -->
        <input type="hidden" th:field="*{duiAfiliado}" />
        <input type="hidden" th:field="*{estado}" />

        <!-- Datos del Vehículo -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-car"></i> Información del Vehículo</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <!-- Marca -->
                    <div class="form-group">
                        <label for="marca">
                            Marca del Vehículo
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="marca"
                               th:field="*{marca}"
                               class="input"
                               placeholder="Ej: Toyota, Honda, Nissan"
                               required
                               maxlength="45">
                        <span class="help-text">Marca del fabricante</span>
                    </div>

                    <!-- Modelo -->
                    <div class="form-group">
                        <label for="modelo">
                            Modelo
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="modelo"
                               th:field="*{modelo}"
                               class="input"
                               placeholder="Ej: Corolla, Civic, Sentra"
                               required
                               maxlength="45">
                        <span class="help-text">Modelo del vehículo</span>
                    </div>

                    <!-- Año -->
                    <div class="form-group">
                        <label for="anio">
                            Año
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="anio"
                               th:field="*{anio}"
                               class="input"
                               placeholder="Ej: 2020"
                               required
                               maxlength="4"
                               pattern="[0-9]{4}">
                        <span class="help-text">Año de fabricación (4 dígitos)</span>
                    </div>

                    <!-- Placa -->
                    <div class="form-group">
                        <label for="placa">
                            Placa
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="placa"
                               th:field="*{placa}"
                               class="input"
                               placeholder="Ej: P123456"
                               required
                               maxlength="10"
                               style="text-transform: uppercase;">
                        <span class="help-text">Número de placa del vehículo</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botones -->
        <div class="actions">
            <button type="submit" class="btn">
                <i th:class="${modoEdicion} ? 'fas fa-save' : 'fas fa-save'"></i>
                <span th:text="${modoEdicion} ? 'Actualizar Vehículo' : 'Guardar Vehículo'">Guardar</span>
            </button>
            <a th:href="${modoEdicion} ? @{/afiliado/editar/{dui}(dui=${afiliadoVehiculo.duiAfiliado})} : @{/afiliado/}"
               class="btn secondary">
                <i class="fas fa-arrow-left"></i> Regresar
            </a>


            <a th:href="@{/afiliado/hogar/editar/{dui}(dui=${dui})}" class="btn secondary">
                <i class="fas fa-arrow-right"></i> Siguiente
            </a>
        </div>
    </form>
</div>

<script>
    // Convertir placa a mayúsculas automáticamente
    document.getElementById('placa').addEventListener('input', function(e) {
        e.target.value = e.target.value.toUpperCase();
    });

    // Validar año (debe ser entre 1900 y año actual + 1)
    document.getElementById('anio').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        e.target.value = value.substring(0, 4);
    });

    document.getElementById('anio').addEventListener('blur', function(e) {
        const anio = parseInt(e.target.value);
        const anioActual = new Date().getFullYear();

        if (anio < 1900 || anio > anioActual + 1) {
            alert('Por favor, ingrese un año válido entre 1900 y ' + (anioActual + 1));
            e.target.value = '';
            e.target.focus();
        }
    });

    // Validar formato de placa (letras y números)
    document.getElementById('placa').addEventListener('blur', function(e) {
        const placa = e.target.value.trim();

        if (placa && placa.length < 5) {
            alert('La placa debe tener al menos 5 caracteres.');
            e.target.focus();
        }
    });

    // Auto-ocultar mensajes después de 5 segundos
    const messages = document.querySelectorAll('.message');
    messages.forEach(message => {
        setTimeout(() => {
            message.style.opacity = '0';
            setTimeout(() => message.remove(), 300);
        }, 5000);
    });

    // Convertir primera letra de marca y modelo a mayúscula
    function capitalizarPrimeraLetra(input) {
        input.addEventListener('blur', function() {
            const words = this.value.split(' ');
            const capitalizedWords = words.map(word => {
                if (word.length > 0) {
                    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                }
                return word;
            });
            this.value = capitalizedWords.join(' ');
        });
    }

    capitalizarPrimeraLetra(document.getElementById('marca'));
    capitalizarPrimeraLetra(document.getElementById('modelo'));

    // Validación del formulario antes de enviar
    document.querySelector('form').addEventListener('submit', function(e) {
        const marca = document.getElementById('marca').value.trim();
        const modelo = document.getElementById('modelo').value.trim();
        const anio = document.getElementById('anio').value.trim();
        const placa = document.getElementById('placa').value.trim();

        if (!marca || !modelo || !anio || !placa) {
            e.preventDefault();
            alert('Por favor, complete todos los campos requeridos.');
            return false;
        }

        // Validar año nuevamente
        const anioNum = parseInt(anio);
        const anioActual = new Date().getFullYear();
        if (anioNum < 1900 || anioNum > anioActual + 1) {
            e.preventDefault();
            alert('El año del vehículo no es válido.');
            return false;
        }
    });
</script>
</body>
</html>
