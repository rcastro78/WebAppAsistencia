<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${esEdicion} ? 'Editar Cliente Corporativo' : 'Nuevo Cliente Corporativo'">Cliente Corporativo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/empresa.css}">
</head>
<body>
<div class="app">
    <div class="header">
        <h1 th:text="${esEdicion} ? 'Editar Cliente Corporativo' : 'Nuevo Cliente Corporativo'">Cliente Corporativo</h1>
        <span class="subtitle" th:text="${esEdicion} ? 'Actualiza la información del cliente' : 'Completa la información para registrar un nuevo cliente'"></span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Datos del Cliente</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/clientesCorporativos/guardar}" th:object="${cliente}" method="post" enctype="multipart/form-data" id="clienteForm">
                <input type="hidden" th:field="*{imagenURL}" id="imagenURLHidden">
                <div class="form-grid">
                    <!-- NIT -->
                    <div class="form-group">
                        <label for="nit"><i class="fas fa-id-card"></i> NIT</label>
                        <input type="text" th:field="*{nit}" id="nit" class="input"
                               placeholder="0000-000000-000-0"
                               pattern="[0-9]{4}-[0-9]{6}-[0-9]{3}-[0-9]"
                               th:readonly="${esEdicion}"
                               required>
                        <small th:if="${esEdicion}" style="color: #666;">El NIT no puede ser modificado</small>
                    </div>

                    <!-- NRC -->
                    <div class="form-group">
                        <label for="nrc"><i class="fas fa-file-invoice"></i> NRC</label>
                        <input type="text" th:field="*{nrc}" id="nrc" class="input"
                               placeholder="000000-0"
                               pattern="[0-9]{6}-[0-9]"
                               required>
                    </div>

                    <!-- Nombre Cliente -->
                    <div class="form-group full-width">
                        <label for="nombreCliente"><i class="fas fa-building"></i> Nombre del Cliente</label>
                        <input type="text" th:field="*{nombreCliente}" id="nombreCliente" class="input"
                               placeholder="Ingrese el nombre del cliente corporativo"
                               maxlength="100"
                               required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="emailContacto"><i class="fas fa-envelope"></i> Email de Contacto</label>
                        <input type="email" th:field="*{emailContacto}" id="emailContacto" class="input"
                               placeholder="correo@cliente.com"
                               maxlength="45"
                               required>
                    </div>

                    <!-- Teléfono -->
                    <div class="form-group">
                        <label for="telefono"><i class="fas fa-phone"></i> Teléfono</label>
                        <input type="tel" th:field="*{telefono}" id="telefono" class="input"
                               placeholder="0000-0000"
                               pattern="[0-9]{4}-[0-9]{4}"
                               required>
                    </div>

                    <!-- Estado -->
                    <div class="form-group">
                        <label><i class="fas fa-toggle-on"></i> Estado</label>
                        <select th:field="*{estado}" class="input" required>
                            <option value="">Seleccione el estado</option>
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>

                    <!-- Logo/Imagen del Cliente -->
                    <div class="form-group full-width">
                        <label><i class="fas fa-image"></i> Logo del Cliente</label>

                        <!-- Mostrar imagen actual si existe -->
                        <div th:if="${esEdicion and cliente.imagenURL != null and !cliente.imagenURL.isEmpty()}"
                             style="margin-bottom: 10px;">
                            <img th:src="@{${cliente.imagenURL}}"
                                 alt="Logo actual"
                                 style="max-width: 200px; max-height: 200px; border: 1px solid #ddd; border-radius: 4px; padding: 5px;">
                            <p style="margin-top: 5px; font-size: 14px; color: #666;">Imagen actual</p>
                        </div>

                        <div class="file-input-wrapper">
                            <input type="file" name="imagenFile" accept="image/*" id="imagenCliente"
                                   onchange="updateFileLabel('imagenCliente', 'imagenLabel')">
                            <label for="imagenCliente" class="file-input-label" id="imagenLabel">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span th:text="${esEdicion} ? 'Cambiar logo del cliente' : 'Subir logo del cliente'"></span>
                            </label>
                        </div>
                        <small style="color: #666;">Formatos: JPG, PNG, GIF. Tamaño máximo: 5MB</small>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i> <span th:text="${esEdicion} ? 'Actualizar' : 'Guardar'"></span>
                    </button>
                    <a th:href="@{/clientesCorporativos}" class="btn secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function updateFileLabel(inputId, labelId) {
        const input = document.getElementById(inputId);
        const label = document.getElementById(labelId);

        if (input.files && input.files.length > 0) {
            const fileName = input.files[0].name;
            label.innerHTML = '<i class="fas fa-check"></i> ' + fileName;
            label.classList.add('file-selected');
        } else {
            const defaultText = document.querySelector('[th\\:text*="esEdicion"]') ? 'Cambiar logo del cliente' : 'Subir logo del cliente';
            label.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> ' + defaultText;
            label.classList.remove('file-selected');
        }
    }

    // Validación del formulario antes de enviar
    document.getElementById('clienteForm').addEventListener('submit', function(e) {
        const imagenInput = document.getElementById('imagenCliente');

        // Verificar tamaño de archivo (max 5MB)
        const maxSize = 5 * 1024 * 1024; // 5MB

        if (imagenInput.files && imagenInput.files.length > 0) {
            if (imagenInput.files[0].size > maxSize) {
                alert('La imagen es demasiado grande. Máximo 5MB.');
                e.preventDefault();
                return false;
            }

            // Validar tipo de archivo
            const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif'];
            if (!allowedTypes.includes(imagenInput.files[0].type)) {
                alert('Tipo de archivo no permitido. Use JPG, PNG o GIF.');
                e.preventDefault();
                return false;
            }
        }

        return true;
    });

    document.addEventListener('DOMContentLoaded', function() {
        // Validación automática del NIT
        const nitInput = document.getElementById('nit');
        if (nitInput && !nitInput.readOnly) {
            nitInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 0) {
                    let formatted = '';
                    if (value.length >= 4) {
                        formatted = value.substring(0, 4) + '-';
                        if (value.length >= 10) {
                            formatted += value.substring(4, 10) + '-';
                            if (value.length >= 13) {
                                formatted += value.substring(10, 13) + '-';
                                formatted += value.substring(13, 14);
                            } else {
                                formatted += value.substring(10);
                            }
                        } else {
                            formatted += value.substring(4);
                        }
                    } else {
                        formatted = value;
                    }
                    e.target.value = formatted;
                }
            });
        }

        // Validación automática del NRC
        const nrcInput = document.getElementById('nrc');
        if (nrcInput) {
            nrcInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length >= 6) {
                    value = value.substring(0, 6) + '-' + value.substring(6, 7);
                }
                e.target.value = value;
            });
        }

        // Validación automática del teléfono
        const telInput = document.getElementById('telefono');
        if (telInput) {
            telInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length >= 4) {
                    value = value.substring(0, 4) + '-' + value.substring(4, 8);
                }
                e.target.value = value;
            });
        }

        // Mejorar la experiencia del file input
        const fileInput = document.getElementById('imagenCliente');
        if (fileInput) {
            fileInput.addEventListener('change', function(e) {
                const label = document.getElementById('imagenLabel');
                const fileName = e.target.files[0]?.name;

                if (fileName) {
                    label.innerHTML = `<i class="fas fa-check-circle"></i> ${fileName}`;
                    label.classList.add('file-selected');
                }
            });
        }
    });
</script>
</body>
</html>
