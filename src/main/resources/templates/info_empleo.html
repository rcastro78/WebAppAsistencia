<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Información de Empleo - Asistencia El Salvador' : 'Nueva Información de Empleo - Asistencia El Salvador'">Información de Empleo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #FF8C00, #FFA500);
        }

        .card-header {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            padding: 25px 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .card-header h2 {
            color: #333;
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h2::before {
            content: '\f0b1';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #FF8C00;
            font-size: 1.2rem;
        }

        .card-body {
            padding: 30px;
        }

        .alert {
            background: #d1ecf1;
            border-left: 4px solid #0dcaf0;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #055160;
        }

        .alert i {
            font-size: 1.2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label .required {
            color: #dc3545;
            font-size: 1.2rem;
        }

        .input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
            background: #fafafa;
            font-family: inherit;
        }

        .input:focus, select:focus {
            border-color: #FF8C00;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
            background: white;
        }

        .input::placeholder {
            color: #aaa;
            font-weight: 400;
        }

        .input:disabled {
            background: #e9ecef;
            cursor: not-allowed;
            color: #6c757d;
        }

        /* Iconos para los labels */
        label[for="profesion"]::before { content: '\f19d'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="cargo"]::before { content: '\f0b1'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="jefeInmediato"]::before { content: '\f007'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="fechaInicio"]::before { content: '\f073'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="fechaFin"]::before { content: '\f073'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }

        /* Checkbox personalizado */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-group:hover {
            background: #e9ecef;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #FF8C00;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            flex: 1;
            font-weight: 500;
        }

        .checkbox-group label::before {
            content: '\f2f1';
            margin-right: 8px;
        }

        /* Select styling */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
            appearance: none;
        }

        select:focus {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23FF8C00' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            min-width: 120px;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:not(.secondary) {
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        .btn:not(.secondary):hover {
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
        }

        .btn.secondary {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: #555;
            padding: 10px 28px;
        }

        .btn.secondary:hover {
            background: #e9ecef;
            color: #333;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .message {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease-out;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        /* Helper text */
        .help-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .help-text::before {
            content: '\f05a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card-body {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1 th:text="${modoEdicion} ? 'Editar Información de Empleo' : 'Paso 2. Información de Empleo'">Información de Empleo</h1>
        <span class="subtitle" th:text="${modoEdicion} ? 'Actualice los datos de su situación laboral' : 'Complete los datos de su situación laboral actual'">Complete los datos</span>
    </div>

    <!-- Mensaje de éxito/error -->
    <div th:if="${mensaje}" class="message success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${error}" class="message error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Datos Laborales</h2>
        </div>
        <div class="card-body">
            <div class="alert">
                <i class="fas fa-info-circle"></i>
                <span>Proporcione información sobre su empleo actual o más reciente. Todos los campos son obligatorios.</span>
            </div>

            <form th:action="${modoEdicion} ? @{/afiliado/info-empleo/actualizar} : @{/afiliado/info-empleo/guardar}"
                  th:object="${infoEmpleo}"
                  method="post">

                <!-- Campo oculto para el ID (solo en modo edición) -->
                <input type="hidden" th:if="${modoEdicion}" th:field="*{idEmpleoAfiliado}" />

                <!-- Campo oculto para el DUI -->
                <input type="hidden" th:field="*{duiAfiliado}" />
                <input type="hidden" th:field="*{estado}" />

                <div class="form-grid">
                    <!-- Profesión -->
                    <div class="form-group">
                        <label for="profesion">
                            Profesión u Oficio
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="profesion"
                               th:field="*{profesion}"
                               class="input"
                               placeholder="Ej: Ingeniero en Sistemas"
                               required
                               maxlength="100">
                        <span class="help-text">Su profesión o especialidad</span>
                    </div>

                    <!-- Cargo -->
                    <div class="form-group">
                        <label for="cargo">
                            Cargo o Puesto
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="cargo"
                               th:field="*{cargo}"
                               class="input"
                               placeholder="Ej: Desarrollador Senior"
                               required
                               maxlength="100">
                        <span class="help-text">Puesto que desempeña</span>
                    </div>

                    <!-- Jefe Inmediato -->
                    <div class="form-group full-width">
                        <label for="jefeInmediato">
                            Jefe Inmediato
                            <span class="required">*</span>
                        </label>
                        <input type="text"
                               id="jefeInmediato"
                               th:field="*{jefeInmediato}"
                               class="input"
                               placeholder="Ej: Carlos Martínez"
                               required
                               maxlength="100">
                        <span class="help-text">Nombre de su supervisor directo</span>
                    </div>

                    <!-- Fecha de Inicio -->
                    <div class="form-group">
                        <label for="fechaInicio">
                            Fecha de Inicio
                            <span class="required">*</span>
                        </label>
                        <input type="date"
                               id="fechaInicio"
                               name="fechaInicio"
                               th:value="${infoEmpleo.fechaInicio != null ? #temporals.format(infoEmpleo.fechaInicio, 'yyyy-MM-dd') : ''}"
                               class="input"
                               required>
                        <span class="help-text">Inicio en el puesto actual</span>
                    </div>

                    <!-- Fecha de Fin -->
                    <div class="form-group">
                        <label for="fechaFin">
                            Fecha de Finalización
                        </label>
                        <input type="date"
                               id="fechaFin"
                               name="fechaFin"
                               th:value="${infoEmpleo.fechaFin != null ? #temporals.format(infoEmpleo.fechaFin, 'yyyy-MM-dd') : ''}"
                               class="input">
                        <span class="help-text">Solo si ya no trabaja aquí</span>
                    </div>

                    <!-- Empleo Actual -->
                    <div class="form-group full-width">
                        <div class="checkbox-group">
                            <input type="hidden" name="actual" value="0">
                            <input type="checkbox"
                                   id="actual"
                                   name="actual"
                                   value="1"
                                   th:checked="${infoEmpleo.actual == 1}"
                                   onchange="toggleFechaFin()">
                            <label for="actual">
                                Trabajo actualmente en este empleo
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div class="actions">
                    <button type="submit" class="btn">
                        <i th:class="${modoEdicion} ? 'fas fa-save' : 'fas fa-save'"></i>
                        <span th:text="${modoEdicion} ? 'Actualizar Información' : 'Guardar Información'">Guardar</span>
                    </button>
                    <a th:href="${modoEdicion} ? @{/afiliado/editar/{dui}(dui=${infoEmpleo.duiAfiliado})} : @{/afiliado/}"
                       class="btn secondary">
                        <i class="fas fa-arrow-left"></i> Volver
                    </a>

                    <a th:href="${esEdicion} ? @{/afiliado/hogar/editar/{dui}(dui=${dui})} : @{/afiliado/contactos-emergencia/nuevo/{dui}(dui=${duiAfiliado})}" class="btn secondary">
                        <i class="fas fa-arrow-right"></i><span th:text="${esEdicion} ? 'Siguiente' : 'Saltar Paso'"></span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // Obtener el valor de actual desde el servidor
    const actualValue = /*[[${infoEmpleo.actual}]]*/ 1;

    // Función para habilitar/deshabilitar fecha fin según checkbox
    function toggleFechaFin() {
        const actualCheckbox = document.getElementById('actual');
        const fechaFinInput = document.getElementById('fechaFin');

        if (actualCheckbox.checked) {
            fechaFinInput.disabled = true;
            fechaFinInput.value = '';
            fechaFinInput.removeAttribute('required');
        } else {
            fechaFinInput.disabled = false;
            fechaFinInput.setAttribute('required', 'required');
        }
    }

    // Validar que fecha de inicio sea menor a fecha fin
    document.querySelector('form').addEventListener('submit', function(e) {
        const fechaInicio = document.getElementById('fechaInicio').value;
        const fechaFin = document.getElementById('fechaFin').value;
        const actualCheckbox = document.getElementById('actual').checked;

        if (!actualCheckbox && fechaFin) {
            const inicio = new Date(fechaInicio);
            const fin = new Date(fechaFin);

            if (fin <= inicio) {
                e.preventDefault();
                alert('La fecha de finalización debe ser posterior a la fecha de inicio.');
                return false;
            }
        }

        // Validar que fecha de inicio no sea futura
        const hoy = new Date();
        hoy.setHours(0, 0, 0, 0);
        const inicio = new Date(fechaInicio);

        if (inicio > hoy) {
            e.preventDefault();
            alert('La fecha de inicio no puede ser futura.');
            return false;
        }
    });

    // Establecer fecha máxima para fecha de inicio (hoy)
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('fechaInicio').setAttribute('max', hoy);
    document.getElementById('fechaFin').setAttribute('max', hoy);

    // Auto-ocultar mensajes después de 5 segundos
    const messages = document.querySelectorAll('.message');
    messages.forEach(message => {
        setTimeout(() => {
            message.style.opacity = '0';
            setTimeout(() => message.remove(), 300);
        }, 5000);
    });

    // Inicializar estado del campo fecha fin al cargar la página
    window.addEventListener('DOMContentLoaded', function() {
        toggleFechaFin();
    });
    /*]]>*/
</script>
</body>
</html>
