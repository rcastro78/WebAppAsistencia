<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Información del Hogar - Asistencia El Salvador' : 'Información del Hogar - Asistencia El Salvador'">Información del Hogar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #FF8C00, #FFA500);
        }

        .card-header {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            padding: 25px 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .card-header h2 {
            color: #333;
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h2::before {
            content: '\f015';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #FF8C00;
            font-size: 1.2rem;
        }

        .card-body {
            padding: 30px;
        }

        .alert {
            background: #d1ecf1;
            border-left: 4px solid #0dcaf0;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #055160;
        }

        .alert i {
            font-size: 1.2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label .required {
            color: #dc3545;
            font-size: 1.2rem;
        }

        .input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
            background: #fafafa;
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .input:focus, select:focus, textarea:focus {
            border-color: #FF8C00;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
            background: white;
        }

        .input::placeholder, textarea::placeholder {
            color: #aaa;
            font-weight: 400;
        }

        /* Iconos para los labels */
        label[for="direccion"]::before { content: '\f3c5'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="idPais"]::before { content: '\f57d'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="idDepto"]::before { content: '\f279'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="idMunicipio"]::before { content: '\f3c5'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }

        /* Select styling */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
            appearance: none;
        }

        select:focus {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23FF8C00' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            min-width: 120px;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:not(.secondary) {
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        .btn:not(.secondary):hover {
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
        }

        .btn.secondary {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: #555;
            padding: 10px 28px;
        }

        .btn.secondary:hover {
            background: #e9ecef;
            color: #333;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .message {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease-out;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .help-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .help-text::before {
            content: '\f05a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card-body {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1 th:text="${modoEdicion} ? 'Editar Información del Hogar - Asistencia del Hogar' : 'Información del Hogar - Asistencia del Hogar'">Información del Hogar</h1>
        <span class="subtitle" th:text="${modoEdicion} ? 'Actualice los datos de su hogar' : 'Complete los datos de su hogar'">Complete los datos</span>
    </div>

    <!-- Mensaje de éxito/error -->
    <div th:if="${mensaje}" class="message success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${error}" class="message error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Datos del Hogar</h2>
        </div>
        <div class="card-body">
            <div class="alert">
                <i class="fas fa-info-circle"></i>
                <span>Proporcione la información completa de su domicilio. Todos los campos son obligatorios.</span>
            </div>

            <form th:action="${modoEdicion} ? @{/afiliado/hogar/actualizar} : @{/afiliado/hogar/guardar}"
                  th:object="${afiliadoHogar}"
                  method="post">

                <!-- Campo oculto para el DUI -->
                <input type="hidden" th:field="*{duiAfiliado}" />

                <div class="form-grid">
                    <!-- Dirección -->
                    <div class="form-group full-width">
                        <label for="direccion">
                            Dirección Completa
                            <span class="required">*</span>
                        </label>
                        <textarea id="direccion"
                                  th:field="*{direccion}"
                                  class="input"
                                  placeholder="Ej: Calle Principal #123, Colonia Las Flores"
                                  required
                                  maxlength="100"></textarea>
                        <span class="help-text">Dirección exacta de su domicilio</span>
                    </div>

                    <!-- País -->
                    <div class="form-group">
                        <label for="idPais">
                            País
                            <span class="required">*</span>
                        </label>
                        <select id="idPais"
                                th:field="*{idPais}"
                                class="input"
                                required
                                onchange="cargarDepartamentos()">
                            <option value="">Seleccione un país</option>
                            <option th:each="pais : ${paises}"
                                    th:value="${pais.idPais}"
                                    th:text="${pais.nombrePais}"></option>
                        </select>
                        <span class="help-text">Seleccione su país</span>
                    </div>

                    <!-- Departamento -->
                    <div class="form-group">
                        <label for="idDepto">
                            Departamento
                            <span class="required">*</span>
                        </label>
                        <select id="idDepto"
                                th:field="*{idDepto}"
                                class="input"
                                required
                                onchange="cargarMunicipios()">
                            <option value="">Seleccione un departamento</option>
                            <option th:each="depto : ${departamentos}"
                                    th:value="${depto.idDepto}"
                                    th:text="${depto.nombreDepto}"
                                    th:selected="${depto.idDepto == afiliadoHogar.idDepto}"></option>
                        </select>
                        <span class="help-text">Seleccione su departamento</span>
                    </div>

                    <!-- Municipio -->
                    <div class="form-group">
                        <label for="idMunicipio">
                            Municipio
                            <span class="required">*</span>
                        </label>
                        <select id="idMunicipio"
                                th:field="*{idMunicipio}"
                                class="input"
                                required>
                            <option value="">Seleccione un municipio</option>
                            <option th:each="municipio : ${municipios}"
                                    th:value="${municipio.idMunicipio}"
                                    th:text="${municipio.nombreMunicipio}"
                                    th:selected="${municipio.idMunicipio == afiliadoHogar.idMunicipio}"></option>
                        </select>
                        <span class="help-text">Seleccione su municipio</span>
                    </div>
                </div>

                <!-- Botones -->
                <div class="actions">
                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i>
                        <span th:text="${modoEdicion} ? 'Actualizar Información' : 'Guardar Información'">Guardar</span>
                    </button>
                    <a th:href="${modoEdicion} ? @{/afiliado/editar/{dui}(dui=${afiliadoHogar.duiAfiliado})} : @{/afiliado/}"
                       class="btn secondary">
                        <i class="fas fa-arrow-left"></i> Volver
                    </a>
                    <a th:href="@{/afiliado/vehiculo/editar/{dui}(dui=${dui})}" class="btn secondary">
                        <i class="fas fa-arrow-right"></i> Siguiente
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/

    // Función para cargar departamentos basados en el país seleccionado
    function cargarDepartamentos() {
        const paisSelect = document.getElementById('idPais');
        const deptoSelect = document.getElementById('idDepto');
        const municipioSelect = document.getElementById('idMunicipio');

        const paisId = paisSelect.value;

        // Limpiar departamentos y municipios
        deptoSelect.innerHTML = '<option value="">Seleccione un departamento</option>';
        municipioSelect.innerHTML = '<option value="">Seleccione un municipio</option>';

        if (paisId) {
            fetch(`/afiliado/hogar/departamentos/${paisId}`)
                .then(response => response.json())
                .then(data => {
                    data.forEach(depto => {
                        const option = document.createElement('option');
                        option.value = depto.idDepto;
                        option.textContent = depto.nombreDepto;
                        deptoSelect.appendChild(option);
                    });
                })
                .catch(error => console.error('Error al cargar departamentos:', error));
        }
    }

    // Función para cargar municipios basados en el departamento seleccionado
    function cargarMunicipios() {
        const deptoSelect = document.getElementById('idDepto');
        const municipioSelect = document.getElementById('idMunicipio');

        const deptoId = deptoSelect.value;

        // Limpiar municipios
        municipioSelect.innerHTML = '<option value="">Seleccione un municipio</option>';

        if (deptoId) {
            fetch(`/afiliado/hogar/municipios/${deptoId}`)
                .then(response => response.json())
                .then(data => {
                    data.forEach(municipio => {
                        const option = document.createElement('option');
                        option.value = municipio.idMunicipio;
                        option.textContent = municipio.nombreMunicipio;
                        municipioSelect.appendChild(option);
                    });
                })
                .catch(error => console.error('Error al cargar municipios:', error));
        }
    }

    // Auto-ocultar mensajes después de 5 segundos
    const messages = document.querySelectorAll('.message');
    messages.forEach(message => {
        setTimeout(() => {
            message.style.opacity = '0';
            setTimeout(() => message.remove(), 300);
        }, 5000);
    });

    // Validación del formulario antes de enviar
    document.querySelector('form').addEventListener('submit', function(e) {
        const direccion = document.getElementById('direccion').value.trim();
        const pais = document.getElementById('idPais').value;
        const depto = document.getElementById('idDepto').value;
        const municipio = document.getElementById('idMunicipio').value;

        if (!direccion || !pais || !depto || !municipio) {
            e.preventDefault();
            alert('Por favor, complete todos los campos requeridos.');
            return false;
        }
    });

    /*]]>*/
</script>
</body>
</html>
