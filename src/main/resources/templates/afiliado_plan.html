<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes de Afiliación - Asistencia El Salvador</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #FF8C00, #FFA500);
        }

        .card-header {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            padding: 25px 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .card-header h2 {
            color: #333;
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h2::before {
            content: '\f0ae';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #FF8C00;
            font-size: 1.2rem;
        }

        .card-body {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
            background: #fafafa;
            font-family: inherit;
        }

        .input:focus, select:focus, textarea:focus {
            border-color: #FF8C00;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
            background: white;
        }

        .input::placeholder, textarea::placeholder {
            color: #aaa;
            font-weight: 400;
        }

        /* Iconos para los labels */
        label[for="planAfiliacion"]::before { content: '\f0ae'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="tipoPlan"]::before { content: '\f02d'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="fechaAfiliacion"]::before { content: '\f073'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }
        label[for="observaciones"]::before { content: '\f075'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #FF8C00; }

        /* Select styling */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 40px;
            appearance: none;
        }

        select:focus {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23FF8C00' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
        }

        /* Textarea especial */
        textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* Signature Pad */
        .signature-section {
            margin-top: 30px;
        }

        .signature-container {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            background: #fafafa;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .signature-container:hover {
            border-color: #FF8C00;
            background: white;
        }

        .signature-pad {
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: crosshair;
            display: block;
            margin: 15px auto;
            max-width: 100%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .signature-label {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .signature-label::before {
            content: '\f304';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #FF8C00;
            font-size: 1.1rem;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            min-width: 120px;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:not(.secondary):not(.danger) {
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        .btn:not(.secondary):not(.danger):hover {
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
        }

        .btn.secondary {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: #555;
            padding: 10px 28px;
        }

        .btn.secondary:hover {
            background: #e9ecef;
            color: #333;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        /* Progress indicator */
        .progress-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .progress-step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            position: relative;
        }

        .progress-step.completed {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .progress-step.active {
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            color: white;
        }

        .progress-step.pending {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: #666;
        }

        .progress-line {
            height: 2px;
            width: 60px;
            background: #e9ecef;
            position: relative;
        }

        .progress-line.completed {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card-body {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .signature-pad {
                width: 100%;
                height: 200px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Paso 4. Planes de Afiliación</h1>
        <span class="subtitle">Seleccione el plan y complete la información adicional</span>
    </div>

    <!-- Progress indicator -->
    <div class="progress-indicator">
        <div class="progress-step completed"><i class="fas fa-check"></i></div>
        <div class="progress-line completed"></div>
        <div class="progress-step active">2</div>
        <div class="progress-line pending"></div>
        <div class="progress-step pending">3</div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Información del Plan</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/afiliado/plan/guardar}" th:object="${planAfiliado}" method="post">
                <!-- Campo oculto para enviar el DUI -->
                <input type="hidden" th:field="*{dui}" readonly class="form-control" />

                <div class="form-grid">
                    <!-- Selección de plan -->
                    <div class="form-group">
                        <label for="planAfiliacion">Plan de Afiliación</label>
                        <select id="planAfiliacion" th:field="*{idPlan}" class="input" required>
                            <option value="">Seleccione un plan...</option>
                            <!-- ❌ MAL: th:value="${session.idPlan}" -->
                            <!-- ✅ BIEN: Usa el ID del plan en el loop -->
                            <option th:each="plan : ${planes}"
                                    th:value="${plan.idPlan}"
                                    th:text="${plan.nombrePlan}">
                            </option>
                        </select>
                    </div>

                    <!-- Vigencia -->
                    <!-- Vigencia -->
                    <div class="form-group">
                        <label for="vigencia">Vigencia (Meses)</label>
                        <select id="vigencia"
                                th:field="*{vigencia}"
                                class="input"
                                th:disabled="${session.rol == 3}"
                                required>
                            <option value="">Seleccione vigencia...</option>
                            <option value="1" th:selected="${session.rol == 3 ? false : *{vigencia} == '1'}">1 mes</option>
                            <option value="12" th:selected="${session.rol == 3 ? true : *{vigencia} == '12'}">12 meses</option>
                        </select>
                    </div>


                    <!-- Observaciones -->
                    <div class="form-group full-width">
                        <label for="observaciones">Observaciones</label>
                        <textarea th:field="*{observaciones}" id="observaciones" class="input"
                                  placeholder="Ingrese cualquier observación adicional..." rows="4"></textarea>
                    </div>
                </div>

                <!-- Firma -->
                <div class="signature-section">
                    <div class="signature-container">
                        <div class="signature-label">Firma del Cliente</div>
                        <canvas id="signaturePad" class="signature-pad" width="600" height="200"></canvas>
                        <input type="hidden" th:field="*{firma}" id="signatureData">
                        <div style="margin-top: 15px;">
                            <button type="button" onclick="clearSignature()" class="btn secondary">
                                <i class="fas fa-eraser"></i> Limpiar Firma
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div class="actions">
                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i> Guardar Plan
                    </button>
                    <a th:href="@{/afiliado/}" th:if="@{session.rol==1}" class="btn secondary">
                        <i class="fas fa-arrow-left"></i> Volver
                    </a>

                    <a th:href="@{/afiliado/miTarjeta/}" th:if="@{session.rol==3}" class="btn secondary">
                        <i class="fas fa-arrow-left"></i> Volver
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Funcionalidad del canvas de firma
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    const signatureData = document.getElementById('signatureData');
    let isDrawing = false;

    // Configurar canvas
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    // Eventos de mouse
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);

    // Eventos táctiles
    canvas.addEventListener('touchstart', handleTouch);
    canvas.addEventListener('touchmove', handleTouch);
    canvas.addEventListener('touchend', stopDrawing);

    function startDrawing(e) {
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function draw(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();

        // Guardar datos de la firma
        signatureData.value = canvas.toDataURL();
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            signatureData.value = canvas.toDataURL();
        }
    }

    function handleTouch(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent(e.type === 'touchstart' ? 'mousedown' :
                                         e.type === 'touchmove' ? 'mousemove' : 'mouseup', {
            clientX: touch.clientX,
            clientY: touch.clientY
        });
        canvas.dispatchEvent(mouseEvent);
    }

    function clearSignature() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        signatureData.value = '';
    }

    // Auto-llenar tipo de plan basado en selección
    document.getElementById('planAfiliacion').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const tipoPlanField = document.getElementById('tipoPlan');

        if (selectedOption.value) {
            // Aquí podrías hacer una llamada AJAX para obtener más detalles del plan
            tipoPlanField.value = selectedOption.text;
        } else {
            tipoPlanField.value = '';
        }
    });

    // Establecer fecha actual por defecto
    document.getElementById('fechaAfiliacion').value = new Date().toISOString();
</script>

</body>
</html>
