<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listado de Médicos - Asistencia El Salvador</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/medicos.css}">
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Gestión de Médicos</h1>
    <span class="subtitle">Administra el cuerpo médico del sistema</span>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Listado de Médicos</h2>
      <a th:href="@{/medicos/nuevo}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Nuevo Médico
      </a>
    </div>

    <div class="breadcrumb">
      <a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a>
      <i class="fas fa-chevron-right"></i>
      <span>Médicos</span>
    </div>

    <!-- Mensajes flash -->
    <div th:if="${success}" class="alert alert-success">
      <i class="fas fa-check-circle"></i>
      <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i>
      <span th:text="${error}"></span>
    </div>

    <div class="card-body">
      <div class="table-container">

        <!-- Tabla con datos -->
        <table class="modern-table" th:if="${not #lists.isEmpty(medicos)}">
          <thead>
          <tr>
            <th><i class="fas fa-id-card"></i> DUI</th>
            <th><i class="fas fa-file-invoice"></i> NIT</th>
            <th><i class="fas fa-user-md"></i> Nombre</th>
            <th><i class="fas fa-user-tag"></i> Apellido</th>
            <th><i class="fas fa-stethoscope"></i> Especialidad</th>
            <th><i class="fas fa-envelope"></i> Correo</th>
            <th><i class="fas fa-phone"></i> Teléfono</th>
            <th><i class="fas fa-toggle-on"></i> Estado</th>
            <th><i class="fas fa-cogs"></i> Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="medico, iterStat : ${medicos}"
              class="fade-in-row"
              th:style="'animation-delay: ' + ${iterStat.index * 0.07} + 's'">

            <td><span class="id-badge" th:text="${medico.dui}"></span></td>
            <td th:text="${medico.nit != null ? medico.nit : '—'}"></td>
            <td><strong th:text="${medico.nombre}"></strong></td>
            <td th:text="${medico.apellido}"></td>

            <!-- Especialidad: busca el nombre en la lista -->
            <td>
                            <span class="especialidad-badge">
                                <th:block th:each="esp : ${especialidades}">
                                    <span th:if="${esp.idEspecialidad == medico.idEspecialidad}"
                                          th:text="${esp.nombreEspecialidad}"></span>
                                </th:block>
                                <span th:if="${medico.idEspecialidad == null}">—</span>
                            </span>
            </td>

            <td th:text="${medico.email}"></td>
            <td th:text="${medico.telefono != null ? medico.telefono : '—'}"></td>

            <!-- Estado: 1 = Activo, 0 = Inactivo -->
            <td>
                            <span class="status-badge status-active" th:if="${medico.estado == 1}">
                                <i class="fas fa-check-circle"></i> Activo
                            </span>
              <span class="status-badge status-inactive" th:unless="${medico.estado == 1}">
                                <i class="fas fa-times-circle"></i> Inactivo
                            </span>
            </td>

            <td>
              <div class="action-icons">
                <a th:href="@{/medicos/editar/{dui}(dui=${medico.dui})}"
                   class="action-btn edit"
                   data-tooltip="Editar">
                  <i class="fas fa-edit"></i>
                </a>
                <a th:href="@{/medicos/eliminar/{dui}(dui=${medico.dui})}"
                   class="action-btn delete"
                   data-tooltip="Eliminar"
                   onclick="return confirm('¿Está seguro que desea eliminar este médico?\n\nEsta acción no se puede deshacer.');">
                  <i class="fas fa-trash-alt"></i>
                </a>
              </div>
            </td>
          </tr>
          </tbody>
        </table>

        <!-- Estado vacío -->
        <div class="empty-state" th:if="${#lists.isEmpty(medicos)}">
          <i class="fas fa-user-md"></i>
          <h3>No hay médicos registrados</h3>
          <p>Comienza agregando un médico al sistema</p>
          <a th:href="@{/medicos/nuevo}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Agregar Médico
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
