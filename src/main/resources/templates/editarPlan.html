<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Plan - Asistencia El Salvador</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/institucion.css}">
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Editar Plan</h1>
        <span class="subtitle">Modifica la información del plan seleccionado</span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Datos del plan</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/plan/actualizar}" th:object="${plan}" method="post">
                <input type="hidden" name="_method" value="put"/>
                <input type="hidden" th:field="*{idPlan}"/>

                <div class="form-grid">

                    <div class="form-group full-width">
                        <label for="nombrePlan"><i class="fas fa-clipboard-list"></i> Nombre del Plan</label>
                        <input type="text" th:field="*{nombrePlan}" id="nombrePlan"
                               class="input" placeholder="Ingrese el nombre del plan" required maxlength="45">
                    </div>

                    <div class="form-group">
                        <label for="costoPlan"><i class="fas fa-dollar-sign"></i> Costo del Plan</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{costoPlan}"
                               th:classappend="${#fields.hasErrors('costoPlan')} ? 'is-invalid'"
                               id="costoPlan"
                               placeholder="0.00"
                               style="padding-left: 30px;"
                               pattern="^\d+(\.\d{1,2})?$"
                               title="Ingrese un número válido (ej: 100.50)"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="costoPlanAnual"><i class="fas fa-dollar-sign"></i> Costo del Plan Anual</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{costoPlan}"
                               th:classappend="${#fields.hasErrors('costoPlan')} ? 'is-invalid'"
                               id="costoPlan"
                               placeholder="0.00"
                               style="padding-left: 30px;"
                               pattern="^\d+(\.\d{1,2})?$"
                               title="Ingrese un número válido (ej: 100.50)"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="estado"><i class="fas fa-toggle-on"></i> Estado</label>
                        <select th:field="*{estado}" id="estado" class="input" required>
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="linkPago"><i class="fas fa-link"></i> Link de Pago (mensual)</label>
                        <input type="url" th:field="*{linkPago}" id="linkPago"
                               class="input" placeholder="https://ejemplo.com/pago">
                        <small style="color: #666; font-size: 0.85rem;">Opcional: URL completa del enlace de pago</small>
                    </div>


                    <div class="form-group full-width">
                        <label for="linkPagoAnual"><i class="fas fa-link"></i> Link de Pago (anual)</label>
                        <input type="url" th:field="*{linkPagoAnual}" id="linkPagoAnual"
                               class="input" placeholder="https://ejemplo.com/pago">
                        <small style="color: #666; font-size: 0.85rem;">Opcional: URL completa del enlace de pago</small>
                    </div>

                </div>

                <div class="actions">
                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i> Actualizar
                    </button>
                    <a th:href="@{/plan}" class="btn secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
    // Validación del costo del plan
    document.addEventListener('DOMContentLoaded', function() {
        const costoPlanInput = document.getElementById('costoPlan');

        if (costoPlanInput) {
            costoPlanInput.addEventListener('input', function(e) {
                let value = parseFloat(e.target.value);

                // Limitar a 99.99
                if (value > 99.99) {
                    e.target.value = 99.99;
                }

                // Asegurar solo 2 decimales
                if (e.target.value.includes('.')) {
                    const parts = e.target.value.split('.');
                    if (parts[1] && parts[1].length > 2) {
                        e.target.value = parseFloat(e.target.value).toFixed(2);
                    }
                }
            });

            // Validación al perder el foco
            costoPlanInput.addEventListener('blur', function(e) {
                if (e.target.value) {
                    e.target.value = parseFloat(e.target.value).toFixed(2);
                }
            });
        }
    });
</script>
</body>
</html>
