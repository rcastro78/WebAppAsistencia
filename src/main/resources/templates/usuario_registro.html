<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Asistencia El Salvador</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/usuario_registro.css}">
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Registro de Usuario</h1>
        <span class="subtitle">Completa la información para crear tu cuenta</span>
    </div>
    <div class="card">
        <div class="card-header">
            <h2>Datos del Usuario</h2>
        </div>
        <div class="card-body">
            <!-- Mostrar mensajes de error -->
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Error message</span>
            </div>

            <!-- Mostrar mensajes de éxito -->
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}">Success message</span>
            </div>

            <form th:action="@{/usuarios/registro}" th:object="${usuario}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="dui"><i class="fas fa-id-card"></i> DUI</label>
                        <input type="text" th:field="*{dui}" id="dui" class="input"
                               placeholder="00000000-0" pattern="[0-9]{8}-[0-9]" title="Formato: 12345678-9" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono"><i class="fas fa-phone"></i> Teléfono</label>
                        <input type="tel" th:field="*{telefono}" id="telefono" class="input"
                               placeholder="0000-0000" pattern="[0-9]{4}-[0-9]{4}" title="Formato: 1234-5678">
                    </div>
                    <div class="form-group">
                        <label for="nombre"><i class="fas fa-user"></i> Nombre</label>
                        <input type="text" th:field="*{nombre}" id="nombre" class="input"
                               placeholder="Ingrese su nombre" maxlength="100" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido"><i class="fas fa-user"></i> Apellido</label>
                        <input type="text" th:field="*{apellido}" id="apellido" class="input"
                               placeholder="Ingrese su apellido" maxlength="100" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" th:field="*{email}" id="email" class="input"
                               placeholder="correo@ejemplo.com" maxlength="100" required>
                    </div>
                    <!-- Rol del usuario -->
                    <div class="form-group full-width">
                        <label for="rol"><i class="fas fa-user-tag"></i> Rol del Usuario</label>
                        <select th:field="*{rol}" id="rol" class="input" required>
                            <option value="">Seleccione un rol...</option>
                            <option value="1">Administrador</option>
                            <option value="2">Vendedor</option>
                        </select>
                    </div>
                    <!-- Contraseña -->
                    <div class="form-group full-width">
                        <label for="contrasena"><i class="fas fa-lock"></i> Contraseña</label>
                        <div class="password-toggle">
                            <input type="password" th:field="*{contrasena}" id="contrasena"
                                   class="input" placeholder="Ingrese su contraseña" maxlength="255" required>
                            <button type="button" class="password-toggle-btn" onclick="togglePassword('contrasena')">
                                <i class="fas fa-eye" id="eye-contrasena"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Confirmar contraseña -->
                    <div class="form-group full-width">
                        <label for="confirmarContrasena"><i class="fas fa-lock"></i> Repetir Contraseña</label>
                        <div class="password-toggle">
                            <input type="password" id="confirmarContrasena" name="confirmarContrasena" class="input"
                                   placeholder="Repita su contraseña" maxlength="255" required>
                            <button type="button" class="password-toggle-btn" onclick="togglePassword('confirmarContrasena')">
                                <i class="fas fa-eye" id="eye-confirmarContrasena"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Requisitos -->
                <div id="password-requirements" style="display:none; margin-top:15px;">
                    <p><strong>La contraseña debe incluir:</strong></p>
                    <ul>
                        <li id="req-length" class="invalid"><i class="fas fa-times"></i> Al menos 8 caracteres</li>
                        <li id="req-uppercase" class="invalid"><i class="fas fa-times"></i> Una letra mayúscula</li>
                        <li id="req-lowercase" class="invalid"><i class="fas fa-times"></i> Una letra minúscula</li>
                        <li id="req-number" class="invalid"><i class="fas fa-times"></i> Un número</li>
                        <li id="req-symbol" class="invalid"><i class="fas fa-times"></i> Un símbolo (@$!%*?&)</li>
                    </ul>
                </div>
                <!-- Barra de fuerza -->
                <div id="password-strength" class="password-strength" style="display:none; margin-top:15px;">
                    <div style="background:#e1e5e9; height:8px; border-radius:4px; overflow:hidden;">
                        <div id="strength-bar" style="width:0%; height:8px; background:#dc3545; transition:width .3s;"></div>
                    </div>
                    <p id="strength-text" style="margin-top:5px; font-size:0.9rem; color:#333;">Fortaleza: Muy débil</p>
                </div>

                <!-- Campo oculto para activo -->
                <input type="hidden" th:field="*{activo}" value="false">

                <div class="actions">
                    <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Registrar</button>
                    <a th:href="@{/usuarios/login}" class="btn secondary"><i class="fas fa-sign-in-alt"></i> Ir a Login</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Mostrar/ocultar contraseña
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const eyeIcon = document.getElementById('eye-' + fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            eyeIcon.classList.replace('fa-eye','fa-eye-slash');
        } else {
            field.type = 'password';
            eyeIcon.classList.replace('fa-eye-slash','fa-eye');
        }
    }

    document.addEventListener('DOMContentLoaded', initPasswordValidation);

    function initPasswordValidation() {
        const form = document.querySelector('form');
        const contrasena = document.getElementById('contrasena');
        const confirmarContrasena = document.getElementById('confirmarContrasena');
        const requirements = document.getElementById('password-requirements');
        const strengthMeter = document.getElementById('password-strength');
        const rolSelect = document.getElementById('rol');

        contrasena.addEventListener('focus', () => {
            requirements.style.display = 'block';
            strengthMeter.style.display = 'block';
        });

        contrasena.addEventListener('input', () => {
            const password = contrasena.value;
            validatePasswordRequirements(password);
            updatePasswordStrength(password);
            validarContrasenas();
        });
        confirmarContrasena.addEventListener('input', validarContrasenas);

        // Validación del rol
        rolSelect.addEventListener('change', function() {
            if (this.value === '') {
                this.style.borderColor = '#dc3545';
            } else {
                this.style.borderColor = '#e1e5e9';
            }
        });

        form.addEventListener('submit', e => {
            const password = contrasena.value;
            const rol = rolSelect.value;

            // Validar contraseña
            if (!isPasswordValid(password)) {
                e.preventDefault();
                alert('La contraseña no cumple con los requisitos de seguridad.');
                return;
            }

            // Validar que las contraseñas coincidan
            if (contrasena.value !== confirmarContrasena.value) {
                e.preventDefault();
                alert('Las contraseñas no coinciden. Por favor, verifique.');
                return;
            }

            // Validar que se haya seleccionado un rol
            if (rol === '') {
                e.preventDefault();
                alert('Por favor, seleccione un rol para el usuario.');
                rolSelect.style.borderColor = '#dc3545';
                rolSelect.focus();
                return;
            }
        });

        function validarContrasenas() {
            if (confirmarContrasena.value === '') return;
            if (contrasena.value !== confirmarContrasena.value) {
                confirmarContrasena.setCustomValidity('Las contraseñas no coinciden');
                confirmarContrasena.style.borderColor = '#dc3545';
            } else {
                confirmarContrasena.setCustomValidity('');
                confirmarContrasena.style.borderColor = '#28a745';
            }
        }
    }

    function validatePasswordRequirements(password) {
        const requirements = {
            length: password.length >= 8,
            uppercase: /[A-Z]/.test(password),
            lowercase: /[a-z]/.test(password),
            number: /\d/.test(password),
            symbol: /[@$!%*?&]/.test(password)
        };
        Object.keys(requirements).forEach(req => {
            const element = document.getElementById('req-' + req);
            const icon = element.querySelector('i');
            if (requirements[req]) {
                element.classList.replace('invalid','valid');
                icon.className = 'fas fa-check';
            } else {
                element.classList.replace('valid','invalid');
                icon.className = 'fas fa-times';
            }
        });
    }

    function isPasswordValid(password) {
        return password.length >= 8 &&
               /[A-Z]/.test(password) &&
               /[a-z]/.test(password) &&
               /\d/.test(password) &&
               /[@$!%*?&]/.test(password);
    }

    function updatePasswordStrength(password) {
        const bar = document.getElementById('strength-bar');
        const text = document.getElementById('strength-text');
        const container = bar.parentElement.parentElement;
        let strength = 0;
        container.className = 'password-strength';

        if (password.length >= 8) strength += 20;
        if (password.length >= 12) strength += 10;
        if (/[a-z]/.test(password)) strength += 15;
        if (/[A-Z]/.test(password)) strength += 15;
        if (/\d/.test(password)) strength += 15;
        if (/[@$!%*?&]/.test(password)) strength += 15;
        if (password.length >= 16) strength += 10;

        let label = 'Muy débil';
        if (strength < 30) { label = 'Muy débil'; container.classList.add('strength-weak'); }
        else if (strength < 60) { label = 'Débil'; container.classList.add('strength-fair'); }
        else if (strength < 80) { label = 'Buena'; container.classList.add('strength-good'); }
        else { label = 'Fuerte'; container.classList.add('strength-strong'); }

        bar.style.width = strength + '%';
        text.textContent = 'Fortaleza: ' + label;
    }
</script>
</body>
</html>
