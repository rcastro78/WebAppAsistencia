<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Asistencia El Salvador</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            border-radius: 20px 20px 0 0;
        }

        .logo {
            margin-bottom: 25px;
        }

        .logo img {
            width: 180px;
            height: auto;
            max-width: 100%;
        }

        .login-card h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .login-card p {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px 15px 45px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .input-group input:focus {
            border-color: #FF8C00;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
            background: white;
        }

        .input-group input::placeholder {
            color: #aaa;
            font-weight: 400;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.3);
            background: linear-gradient(135deg, #FFA500, #FF8C00);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: #555;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #dee2e6;
            color: #333;
        }

        .extra-actions {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }

        .extra-actions p {
            margin: 0;
            color: #666;
        }

        .extra-actions a {
            color: #4A90E2;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .extra-actions a:hover {
            color: #357ABD;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
                margin: 10px;
            }

            .login-card h2 {
                font-size: 1.6rem;
            }

            .logo img {
                width: 150px;
            }

            .btn {
                padding: 12px;
                font-size: 1rem;
            }

            .input-group input {
                padding: 12px 18px 12px 40px;
            }
        }

        /* Animación de entrada */
        .login-card {
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Estados de loading */
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary:disabled:hover {
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <img th:src="@{/images/asistencia.jpeg}" alt="Logo Asistencia El Salvador">
    </div>
    <h2>Bienvenido</h2>
    <p>Inicia sesión con tu DUI y contraseña para acceder a tu cuenta</p>
    <form th:action="@{/usuarios/login}" method="post">
        <input type="hidden" name="redirectUrl" th:value="${redirectUrl}"/>
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" name="dui" placeholder="DUI (ej: 12345678-9)" required maxlength="10">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt"></i> Ingresar
        </button>

    </form>
    <div class="extra-actions">
        <p>¿No tienes cuenta? <a th:href="@{/afiliado/registrate}">Regístrate como afiliado</a></p>
    </div>
    <div class="extra-actions">
        <p>¿No tienes cuenta? <a th:href="@{/admin/vendedores/registro}">Regístrate como vendedor de servicios</a></p>
    </div>
    <footer>
        Versión 0.0.2</span>
    </footer>
</div>
</body>
</html>
