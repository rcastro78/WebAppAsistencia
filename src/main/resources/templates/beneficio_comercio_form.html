<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${esNuevo ? 'Nuevo Beneficio' : 'Editar Beneficio'} + ' - Asistencia El Salvador'">
        Beneficio - Asistencia El Salvador
    </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/empresa.css}"/>
</head>
<body>

<div class="app">
    <div class="header">
        <h1 th:text="${esNuevo ? 'Nuevo Beneficio' : 'Editar Beneficio'}">Beneficio</h1>
        <span class="subtitle"
              th:text="${esNuevo ?
            'Completa la información para registrar un nuevo beneficio' :
            'Modifica la información del beneficio'}">
    </span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Datos del beneficio</h2>
        </div>
        <div class="card-body">

            <form th:action="@{/beneficiosComercioAfiliado/guardar}"
                  th:object="${beneficio}"
                  method="post"
                  id="beneficioForm">

                <!-- Campos ocultos -->
                <input type="hidden" th:field="*{nitComercio}"/>
                <input type="hidden" th:if="${!esNuevo}" th:field="*{idBeneficio}"/>

                <div class="form-grid">

                    <!-- NIT (solo lectura) -->
                    <div class="form-group">
                        <label for="nitDisplay">NIT Empresa</label>
                        <input type="text" id="nitDisplay" class="input"
                               th:value="${empresa.nit}" readonly/>
                    </div>

                    <!-- Nombre Empresa (solo lectura) -->
                    <div class="form-group">
                        <label for="nombreEmpresaDisplay">Empresa</label>
                        <input type="text" id="nombreEmpresaDisplay" class="input"
                               th:value="${empresa.nombreEmpresa}" readonly/>
                    </div>

                    <!-- ID Beneficio (solo en nuevo) -->
                    <div class="form-group" th:if="${esNuevo}">
                        <label for="idBeneficio">ID Beneficio</label>
                        <input type="text" th:field="*{idBeneficio}" id="idBeneficio"
                               class="input" placeholder="Ej: 1001" required/>
                    </div>

                    <!-- Nombre del Beneficio -->
                    <div class="form-group">
                        <label for="nombreBeneficio">Nombre del Beneficio</label>
                        <input type="text" th:field="*{nombreBeneficio}" id="nombreBeneficio"
                               class="input" placeholder="Ej: 20% de descuento en consultas"
                               maxlength="200" required/>
                    </div>

                    <!-- Fecha Inicio -->
                    <div class="form-group">
                        <label for="fechaInicio">Fecha Inicio</label>
                        <input type="date" th:field="*{fechaInicio}" id="fechaInicio"
                               class="input" required/>
                    </div>

                    <!-- Fecha Fin -->
                    <div class="form-group">
                        <label for="fechaFin">Fecha Fin</label>
                        <input type="date" th:field="*{fechaFin}" id="fechaFin"
                               class="input" required/>
                    </div>

                    <!-- Estado -->
                    <div class="form-group">
                        <label for="estado"><i class="fas fa-toggle-on"></i> Estado</label>
                        <select th:field="*{estado}" id="estado" class="input" required>
                            <option value="">Seleccione el estado</option>
                            <option value="1" th:selected="${!esNuevo && beneficio.estado == 1}">Activo</option>
                            <option value="0" th:selected="${!esNuevo && beneficio.estado == 0}">Inactivo</option>
                        </select>
                    </div>

                </div><!-- /form-grid -->

                <div class="actions">
                    <button type="submit" class="btn">
                        <i th:class="${esNuevo ? 'fas fa-save' : 'fas fa-edit'}"></i>
                        <span th:text="${esNuevo ? 'Guardar' : 'Actualizar'}">Guardar</span>
                    </button>
                    <a th:href="@{/beneficiosComercioAfiliado/comercio/{nit}(nit=${empresa.nit})}" class="btn secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {

      // Campos readonly con estilo
      document.querySelectorAll('input[readonly]').forEach(el => {
        el.style.backgroundColor = '#e9ecef';
        el.style.cursor = 'not-allowed';
      });

      // Contador de caracteres para nombre del beneficio
      const nombreInput = document.getElementById('nombreBeneficio');
      if (nombreInput) {
        const counter = document.createElement('small');
        counter.style.cssText = 'display:block; margin-top:5px; font-size:0.85rem; color:#6c757d; font-style:italic;';
        nombreInput.parentNode.appendChild(counter);

        function updateCounter() {
          const len = nombreInput.value.length;
          counter.textContent = `${len}/200 caracteres`;
          counter.style.color = len > 180 ? '#dc3545' : '#6c757d';
        }

        nombreInput.addEventListener('input', updateCounter);
        updateCounter();
      }

      // Validación del formulario
      document.getElementById('beneficioForm').addEventListener('submit', function (e) {
        const nombre = document.getElementById('nombreBeneficio').value.trim();
        const inicio = document.getElementById('fechaInicio').value;
        const fin    = document.getElementById('fechaFin').value;
        const estado = document.getElementById('estado').value;

        if (!nombre || !inicio || !fin || !estado) {
          alert('Por favor complete todos los campos requeridos.');
          e.preventDefault();
          return false;
        }

        if (inicio > fin) {
          alert('La fecha de inicio no puede ser mayor a la fecha fin.');
          e.preventDefault();
          return false;
        }
      });

    });
</script>

</body>
</html>
