<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${modoEdicion} ? 'Editar Casa - Asistencia El Salvador' : 'Nueva Casa - Asistencia El Salvador'">
        Casa - Asistencia El Salvador
    </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/nuevo_afiliado.css}">

    <style>
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: 12px;
            vertical-align: middle;
        }
        .mode-badge.nuevo  { background: #d4edda; color: #155724; }
        .mode-badge.editar { background: #fff3cd; color: #856404; }

        input[readonly] {
            background: #f5f5f5 !important;
            cursor: not-allowed;
            opacity: 0.75;
        }

        .form-section-title {
            grid-column: 1 / -1;
            font-size: 14px;
            font-weight: 700;
            color: #4A90E2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e3ecf7;
            padding-bottom: 6px;
            margin-top: 10px;
        }

        .col-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- ── Header ── -->
    <div class="header">
        <h1>
            <i th:class="${modoEdicion} ? 'fas fa-edit' : 'fas fa-house-user'"></i>
            <span th:text="${modoEdicion} ? 'Editar Casa Afiliada' : 'Registro de Casa Afiliada'"></span>
            <span class="mode-badge"
                  th:classappend="${modoEdicion} ? 'editar' : 'nuevo'"
                  th:text="${modoEdicion} ? 'Modo Edición' : 'Nuevo Registro'">
            </span>
        </h1>
        <span class="subtitle"
              th:text="${modoEdicion}
                        ? 'Modifica los datos de la casa seleccionada'
                        : 'Completa la información para registrar una nueva casa afiliada'">
        </span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 th:text="${modoEdicion} ? 'Datos de la Casa' : 'Datos de la Nueva Casa'"></h2>
        </div>

        <div class="card-body">

            <!--
                ACTION dinámica:
                  - Nuevo  → POST /casas/guardar
                  - Editar → POST /casas/actualizar
            -->
            <form id="casaForm"
                  th:action="${modoEdicion} ? @{/casas/actualizar} : @{/casas/guardar}"
                  th:object="${casa}"
                  method="post">

                <div class="form-grid">

                    <!-- ── Sección: Identificación ── -->
                    <div class="form-section-title">
                        <i class="fas fa-house-user"></i> Identificación de la Casa
                    </div>

                    <!-- ID Casa (readonly en edición) -->
                    <div class="form-group">
                        <label for="idCasa">
                            <i class="fas fa-hashtag"></i> ID Casa
                            <span th:if="${!modoEdicion}" style="color:#e74c3c">*</span>
                        </label>
                        <input type="number"
                               th:field="*{idCasa}"
                               id="idCasa"
                               class="input"
                               placeholder="Se genera automáticamente"
                               th:readonly="${modoEdicion}"
                               min="1">
                        <small th:if="${modoEdicion}" style="color:#888;">
                            <i class="fas fa-lock"></i> El ID no puede modificarse.
                        </small>
                        <small th:if="${!modoEdicion}" style="color:#aaa;">
                            <i class="fas fa-info-circle"></i> Déjalo vacío para generarlo automáticamente.
                        </small>
                    </div>

                    <!-- DUI Afiliado -->
                    <div class="form-group">
                        <label for="duiUsuario">
                            <i class="fas fa-id-card"></i> DUI del Afiliado
                            <span style="color:#e74c3c">*</span>
                        </label>
                        <input type="text"
                               th:field="*{duiUsuario}"
                               id="duiUsuario"
                               class="input"
                               placeholder="00000000-0"
                               pattern="[0-9]{8}-[0-9]"
                               th:value="${duiAfiliado != null} ? ${duiAfiliado} : *{duiUsuario}"
                               th:readonly="${duiAfiliado != null}"
                               required>
                    </div>

                    <!-- ── Sección: Ubicación ── -->
                    <div class="form-section-title">
                        <i class="fas fa-map-marker-alt"></i> Ubicación
                    </div>

                    <!-- Dirección (ancho completo) -->
                    <div class="form-group full-width">
                        <label for="direccion">
                            <i class="fas fa-road"></i> Dirección
                            <span style="color:#e74c3c">*</span>
                        </label>
                        <input type="text"
                               th:field="*{direccion}"
                               id="direccion"
                               class="input"
                               placeholder="Ej: Colonia Escalón, Calle La Reforma #21"
                               maxlength="45"
                               required>
                        <small id="dirCounter" style="color:#aaa;">Máximo 45 caracteres – debe ser única en el sistema.</small>
                    </div>

                    <!-- Depto / Municipio / Distrito -->
                    <div class="col-3">
                        <div class="form-group">
                            <label for="idDepto">
                                <i class="fas fa-map"></i> Departamento
                            </label>
                            <input type="number"
                                   th:field="*{idDepto}"
                                   id="idDepto"
                                   class="input"
                                   placeholder="ID Departamento"
                                   min="1">
                        </div>

                        <div class="form-group">
                            <label for="idMunicipio">
                                <i class="fas fa-city"></i> Municipio
                            </label>
                            <input type="number"
                                   th:field="*{idMunicipio}"
                                   id="idMunicipio"
                                   class="input"
                                   placeholder="ID Municipio"
                                   min="1">
                        </div>

                        <div class="form-group">
                            <label for="idDistrito">
                                <i class="fas fa-map-pin"></i> Distrito
                            </label>
                            <input type="number"
                                   th:field="*{idDistrito}"
                                   id="idDistrito"
                                   class="input"
                                   placeholder="ID Distrito"
                                   min="1">
                        </div>
                    </div>

                    <!-- ── Sección: Características ── -->
                    <div class="form-section-title">
                        <i class="fas fa-bed"></i> Características
                    </div>

                    <!-- Número de habitaciones -->
                    <div class="form-group">
                        <label for="numHabitaciones">
                            <i class="fas fa-bed"></i> N.º de Habitaciones
                        </label>
                        <input type="number"
                               th:field="*{numHabitaciones}"
                               id="numHabitaciones"
                               class="input"
                               placeholder="Ej: 3"
                               min="0"
                               max="99">
                    </div>

                </div><!-- /form-grid -->

                <!-- ── Botones ── -->
                <div class="actions">

                    <!-- Guardar / Actualizar -->
                    <button type="submit" class="btn">
                        <i th:class="${modoEdicion} ? 'fas fa-save' : 'fas fa-plus-circle'"></i>
                        <span th:text="${modoEdicion} ? 'Actualizar Casa' : 'Guardar Casa'"></span>
                    </button>

                    <!-- Cancelar → vuelve al listado -->
                    <a th:href="@{/casas}" class="btn secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>

                    <!-- Eliminar (solo en modo edición) -->
                    <button type="button"
                            class="btn"
                            style="background: #e74c3c;"
                            th:if="${modoEdicion}"
                            th:data-id="*{idCasa}"
                            th:data-info="*{'Casa #' + idCasa + ' – ' + direccion}"
                            onclick="confirmarEliminacionInline(this)">
                        <i class="fas fa-trash-alt"></i> Eliminar Casa
                    </button>
                </div>

            </form>

            <!-- Formulario oculto para eliminar (solo en edición) -->
            <form th:if="${modoEdicion}"
                  id="deleteFormInline"
                  th:action="@{/casas/delete/{id}(id=${casa.idCasa})}"
                  method="post"
                  style="display: none;">
            </form>

        </div><!-- /card-body -->
    </div><!-- /card -->
</div><!-- /app -->

<script>
    // ── Eliminar desde formulario de edición ──────────────────────────────────
    function confirmarEliminacionInline(btn) {
        const id   = btn.dataset.id;
        const info = btn.dataset.info;

        const ok = confirm(
            '⚠️ ADVERTENCIA ⚠️\n\n' +
            `¿Está seguro que desea eliminar:\n${info}?\n\n` +
            '• Esta acción no se puede deshacer\n' +
            '• Se perderán todos los datos asociados\n\n' +
            '¿Desea continuar?'
        );

        if (ok) {
            const input = prompt('Para confirmar la eliminación, escriba: CONFIRMAR');
            if (input === 'CONFIRMAR') {
                document.getElementById('deleteFormInline').submit();
            } else {
                alert('❌ Eliminación cancelada. El texto ingresado no coincide.');
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function () {

        // ── Formato automático de DUI ─────────────────────────────────────────
        const duiInput = document.getElementById('duiUsuario');
        if (duiInput && !duiInput.readOnly) {
            duiInput.addEventListener('input', function (e) {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length >= 8) {
                    v = v.substring(0, 8) + '-' + v.substring(8, 9);
                }
                e.target.value = v;
            });
        }

        // ── Contador de caracteres en dirección ───────────────────────────────
        const dirInput   = document.getElementById('direccion');
        const dirCounter = document.getElementById('dirCounter');
        if (dirInput && dirCounter) {
            const actualizar = () => {
                const restantes = 45 - dirInput.value.length;
                dirCounter.textContent =
                    `${restantes} caracteres restantes – debe ser única en el sistema.`;
                dirCounter.style.color = restantes < 10 ? '#e74c3c' : '#aaa';
            };
            dirInput.addEventListener('input', actualizar);
            actualizar(); // ejecutar al cargar (modo edición ya tiene valor)
        }
    });
</script>
</body>
</html>
